# 应用配置（仅 YAML，无 Python 配置文件）

app:
  name: "West Pacific Petrochemical"
  debug: false

server:
  host: "0.0.0.0"
  port: 8866

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "123456"
  name: "west-pacific"
  # 连接 URL 由代码根据以上字段拼接

redis:
  url: "redis://localhost:6379/0"

vector_store:
  type: "chroma"
  url: ""

storage:
  minio_endpoint: "localhost:9000"
  minio_access_key: ""
  minio_secret_key: ""
  minio_bucket: "default"

# JWT 密钥建议至少 32 字符，否则 PyJWT 会报 InsecureKeyLengthWarning（HS256 推荐 256 位）
jwt:
  secret_key: "change-me-in-production-min-32-chars"
  algorithm: "HS256"
  access_token_expire_minutes: 60
