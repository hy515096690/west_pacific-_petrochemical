name = "west-pacific-petrochemical-platform"
version = "0.1.0"
description = "基于大模型的AI应用平台"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.12"
authors = [
    { name = "haoy", email = "hyzl156@126.com" }
]
keywords = ["ai", "llm", "rag", "langchain", "langgraph", "agent"]

