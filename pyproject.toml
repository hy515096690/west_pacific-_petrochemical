# ==============================================================
# 📂 包发现（setuptools 从 backend 目录找 app 包）
# ==============================================================
[tool.setuptools.packages.find]
where = ["backend"]

# ==============================================================
# ⚙️ 工具配置（原来需要单独 setup.cfg / .flake8 等文件）
# ==============================================================

# ── Black 代码格式化配置 ───────────────────────────────────────
[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | __pycache__
  | alembic/versions
)/
'''

# ── Ruff 代码检查配置 ──────────────────────────────────────────
[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [".git", "__pycache__", "alembic/versions", ".venv"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long（black 已处理）
    "B008",  # do not perform function calls in default arguments
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

# ── isort import 排序配置 ──────────────────────────────────────
[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["app"]

# ── Mypy 静态类型检查配置 ──────────────────────────────────────
[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
disallow_untyped_defs = true
disallow_any_generics = false
warn_return_any = true
warn_unused_ignores = true
exclude = ["alembic/", "tests/"]

# ── Pytest 测试配置 ────────────────────────────────────────────
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov",
    "-v",
]

# ── Coverage 测试覆盖率配置 ────────────────────────────────────
[tool.coverage.run]
source = ["app"]
omit = ["tests/*", "alembic/*", "*/migrations/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]