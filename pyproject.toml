# ==============================================================
# pyproject.toml — AI Platform 项目统一配置文件
# 整合 requirements.txt + requirements-dev.txt
# ==============================================================

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

# ==============================================================
# 📦 项目基本信息
# ==============================================================
